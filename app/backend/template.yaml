AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Club 32 — wait-times Lambda backend (v0) + PWA hosting (v0.5)

Parameters:
  ApiKeyValue:
    Type: String
    NoEcho: true
    MinLength: 20
    MaxLength: 128
    Description: >
      API key value that clients must send as the x-api-key header.
      Used for both API Gateway's key check AND the Lambda's defensive check.

  CorsOrigin:
    Type: String
    Default: '*'
    Description: >
      Value of the Access-Control-Allow-Origin header. During v0.5 bootstrap
      this stays '*'; once CloudFront is deployed, redeploy with the pinned
      CloudFront URL (e.g. https://d1abc234.cloudfront.net).

  FirebaseServiceAccountJson:
    Type: String
    NoEcho: true
    MinLength: 100
    Description: >
      Single-line JSON content of the Firebase service-account key. Pasted
      via deploy.sh on each deploy; never stored on disk in this repo.
      Used by the waits handler (read historical_averages) and the averages
      cron (read wait_times, write historical_averages).

  AllowAnonymousPremium:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      When 'true', anonymous Firebase users get full premium (predictive) data
      from /v0/waits and /v2/recommendations — used for the web-demo build and
      local dev. MUST stay 'false' in production so the paywall actually holds:
      anonymous is the web sign-in path, so 'true' would unlock everyone.

  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-haiku-4-5-20251001-v1:0
    Description: >
      Inference profile ID for the Bedrock model invoked by /v2/recommendations.
      Default is Claude Haiku 4.5 — the launch model for v2. Swap to Sonnet 4.6
      (us.anthropic.claude-sonnet-4-...) by redeploying with a different value;
      no code change needed.

  BedrockRegion:
    Type: String
    Default: us-west-2
    Description: >
      AWS region the Bedrock SDK calls. Should match the region where you
      enabled the model (model access propagated 2026-05 — see Slice C.0
      walkthrough). Doesn't have to be the same region as this CloudFormation
      stack but using us-west-2 across the board keeps latency lowest.

  BedrockBudgetAlarmEmail:
    Type: String
    Default: ''
    Description: >
      Email address subscribed to the Bedrock-spend CloudWatch alarm topic.
      Leave blank to skip the alarm + SNS topic entirely. Confirms via AWS
      verification email after first deploy.

  AppleSharedSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: >
      App-specific shared secret from App Store Connect (Monetization →
      In-App Purchases → App-Specific Shared Secret). Required for
      server-side Apple receipt verification on IAP purchases.

Conditions:
  HasBudgetEmail: !Not [!Equals [!Ref BedrockBudgetAlarmEmail, '']]

Resources:
  # --- API Gateway ---

  WaitsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: !Sub "'${CorsOrigin}'"
        AllowHeaders: "'x-api-key, content-type'"
        AllowMethods: "'GET, POST, OPTIONS'"

  WaitsApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: WaitsApiprodStage
    Properties:
      Name: club32-v0-key
      Enabled: true
      Value: !Ref ApiKeyValue

  WaitsUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: WaitsApiprodStage
    Properties:
      UsagePlanName: club32-v0-usage-plan
      ApiStages:
        - ApiId: !Ref WaitsApi
          Stage: prod

  WaitsUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref WaitsApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref WaitsUsagePlan

  # --- Lambda ---

  WaitsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: club32-waits-handler
      Runtime: nodejs22.x
      Handler: handler.handler
      Architectures: [arm64]
      # Bumped 256 → 1024 in Slice C: cold start was pegging CPU at the
      # 256MB tier and timing out on the 29s API Gateway cap while loading
      # ~6.5k historical_averages docs + ride_stats + ride_metadata before
      # the Bedrock invoke. 1024MB gives ~4x the CPU and lets cold start
      # land in the 8-12s range. Lambda bills by GB-ms so cost roughly
      # doubles per call, but each call is ~3-5x faster — net win.
      MemorySize: 1024
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              # Cross-region inference profiles (the `us.*` model IDs) route
              # the actual InvokeModel call to a foundation-model ARN in
              # whatever region has capacity — us-east-1, us-west-2, etc.
              # The inference-profile resource is account-scoped, but the
              # downstream foundation-model resource has to cover any region.
              Resource:
                - !Sub arn:aws:bedrock:*::foundation-model/anthropic.*
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*
            # AWS Marketplace requires these on the calling principal for
            # newer Anthropic models distributed via Marketplace (Haiku 4.5
            # is one). Without them, InvokeModel returns AccessDeniedException
            # with "aws-marketplace:ViewSubscriptions / Subscribe" in the
            # message. Resource: * because Marketplace actions are global.
            - Effect: Allow
              Action:
                - aws-marketplace:ViewSubscriptions
                - aws-marketplace:Subscribe
              Resource: '*'
      Environment:
        Variables:
          API_KEY: !Ref ApiKeyValue
          CORS_ORIGIN: !Ref CorsOrigin
          FIREBASE_SERVICE_ACCOUNT_JSON: !Ref FirebaseServiceAccountJson
          ALLOW_ANONYMOUS_PREMIUM: !Ref AllowAnonymousPremium
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_REGION: !Ref BedrockRegion
          APPLE_SHARED_SECRET: !Ref AppleSharedSecret
      Events:
        Combined:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v0/waits
            Method: get
            Auth:
              ApiKeyRequired: true
        Disneyland:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v0/waits/disneyland
            Method: get
            Auth:
              ApiKeyRequired: true
        CaliforniaAdventure:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v0/waits/california-adventure
            Method: get
            Auth:
              ApiKeyRequired: true
        Recommendations:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v2/recommendations
            Method: post
            Auth:
              ApiKeyRequired: true
        DeviceRegister:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/devices
            Method: post
            Auth:
              ApiKeyRequired: true
        DeviceArm:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/devices/{deviceId}/arm
            Method: post
            Auth:
              ApiKeyRequired: true
        DeviceMustDo:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/devices/{deviceId}/must-do
            Method: post
            Auth:
              ApiKeyRequired: true
        DeviceDailyParks:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/devices/{deviceId}/daily-parks
            Method: post
            Auth:
              ApiKeyRequired: true
        DeviceNotificationTypes:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/devices/{deviceId}/notification-types
            Method: post
            Auth:
              ApiKeyRequired: true
        DeviceNotificationsList:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/devices/{deviceId}/notifications
            Method: get
            Auth:
              ApiKeyRequired: true
        UserTripPurchase:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/users/trip/purchase
            Method: post
            Auth:
              ApiKeyRequired: true
        UserCreate:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/users
            Method: post
            Auth:
              ApiKeyRequired: true
        UserMe:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/users/me
            Method: get
            Auth:
              ApiKeyRequired: true
        UserDelete:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/users/me
            Method: delete
            Auth:
              ApiKeyRequired: true
        UserTrip:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/users/trip
            Method: get
            Auth:
              ApiKeyRequired: true
        UserTripClaimFree:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/users/trip/claim-free
            Method: post
            Auth:
              ApiKeyRequired: true
        PromoValidate:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/promo/validate
            Method: post
            Auth:
              ApiKeyRequired: true
        PromoCheck:
          Type: Api
          Properties:
            RestApiId: !Ref WaitsApi
            Path: /v1/promo/check
            Method: get
            Auth:
              ApiKeyRequired: true
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handler.ts

  # --- Bedrock budget alarm (optional; only created when BedrockBudgetAlarmEmail is set) ---

  BedrockBudgetTopic:
    Type: AWS::SNS::Topic
    Condition: HasBudgetEmail
    Properties:
      TopicName: club32-bedrock-budget-alarm
      DisplayName: Club 32 Bedrock spend alarm

  BedrockBudgetSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasBudgetEmail
    Properties:
      Protocol: email
      TopicArn: !Ref BedrockBudgetTopic
      Endpoint: !Ref BedrockBudgetAlarmEmail

  BedrockBudgetAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasBudgetEmail
    Properties:
      AlarmName: club32-bedrock-spend-over-10
      AlarmDescription: Triggers when estimated Bedrock charges exceed $10 in a month.
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: ServiceName
          Value: AmazonBedrock
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600       # 6 hours; AWS/Billing only updates every 6h or so
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BedrockBudgetTopic
      TreatMissingData: notBreaching

  # --- PWA hosting (v0.5) ---

  # S3 bucket holding the exported Expo web bundle. Private — only the
  # CloudFront distribution (via OAC) can read it.
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "club32-pwa-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  # Origin Access Control (OAC) — the modern replacement for OAI. Lets
  # CloudFront sign its requests to S3 so the bucket can stay fully private.
  WebOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "club32-pwa-oac-${AWS::AccountId}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # The CloudFront distribution. Defaults:
  # - HTTPS-only (redirect HTTP → HTTPS).
  # - 5-minute cache TTL so deploys propagate without manual invalidation
  #   (deploy-web.sh also invalidates, for instant propagation when needed).
  # - SPA fallback: 403/404 from S3 → return /index.html with 200, so any
  #   future client-side routing keeps working.
  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Club 32 PWA
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt WebOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS-managed cache policy: CachingOptimized (1d default, 1y max,
          # respects Cache-Control headers). We override the *minimum* via
          # invalidation in deploy-web.sh; for v0.5 this is plenty.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 60

  # Bucket policy: grant s3:GetObject to the CloudFront distribution via
  # OAC's SourceArn condition. Without this, CloudFront's signed requests
  # to S3 would be denied.
  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

Outputs:
  ApiUrl:
    Description: Base URL of the API Gateway endpoint (combine with /v0/waits[...] for full paths)
    Value: !Sub https://${WaitsApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  ApiKeyId:
    Description: Logical ID of the API Gateway API key (for AWS Console reference; clients use the Value, not the ID)
    Value: !Ref WaitsApiKey
  WebBucketName:
    Description: S3 bucket name for the PWA static files (used by deploy-web.sh)
    Value: !Ref WebBucket
  WebDistributionId:
    Description: CloudFront distribution ID (used by deploy-web.sh for cache invalidation)
    Value: !Ref WebDistribution
  WebDistributionDomain:
    Description: CloudFront distribution domain (the URL users actually visit)
    Value: !GetAtt WebDistribution.DomainName
  WebDistributionUrl:
    Description: Full HTTPS URL of the PWA (use this as the CorsOrigin in subsequent deploys)
    Value: !Sub "https://${WebDistribution.DomainName}"
