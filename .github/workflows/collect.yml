name: Collect Disney wait times

on:
  repository_dispatch:
    types: [collect]
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # collect.js writes the latest tick; scanner.js reads it back and
      # decides which armed devices to notify. Chained in one step so both
      # share the same GitHub Actions billed minute (collector ~20s, scanner
      # ~20-30s, total well under 60s). The hard rule that collect.js only
      # writes is preserved — scanner.js is the new read+notify surface.
      - run: node collect.js && node scanner.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # VAPID credentials for Web Push. When any of the three is missing,
          # scanner.js falls back to dry-run mode (logs candidates, doesn't
          # actually send pushes). VAPID_SUBJECT is typically "mailto:you@x".
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
