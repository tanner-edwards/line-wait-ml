name: Rebuild closure profiles

# Runs every Sunday at 10:00 UTC (3 AM PT) — low-traffic window.
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install firebase-admin pandas numpy
      - name: Rebuild closure profiles
        run: python cron/build_closure_profiles.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
