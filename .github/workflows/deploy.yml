name: Deploy Club 32

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options:
          - both
          - backend
          - frontend
        default: both

jobs:
  deploy-backend:
    name: Deploy backend (Lambda)
    if: ${{ github.event.inputs.target == 'backend' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Resolve CORS origin from existing stack
        id: cors
        run: |
          CORS=$(aws cloudformation describe-stacks \
            --stack-name club32-backend \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionUrl'].OutputValue | [0]" \
            --output text 2>/dev/null || echo "None")
          [[ "$CORS" == "None" || -z "$CORS" ]] && CORS="*"
          echo "origin=$CORS" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: app/backend
        run: sam build

      - name: Deploy
        working-directory: app/backend
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          FIREBASE_JSON_B64=$(echo "$FIREBASE_JSON" | base64 -w 0)
          sam deploy \
            --stack-name club32-backend \
            --region us-west-2 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --s3-prefix club32-backend \
            --parameter-overrides \
              "ApiKeyValue=${{ secrets.CLUB32_API_KEY }}" \
              "CorsOrigin=${{ steps.cors.outputs.origin }}" \
              "FirebaseServiceAccountJson=$FIREBASE_JSON_B64" \
              "AppleSharedSecret=${{ secrets.APPLE_SHARED_SECRET }}" \
            --no-confirm-changeset

  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    if: ${{ github.event.inputs.target == 'frontend' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Resolve S3 bucket, CloudFront distribution, and API URL
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name club32-backend \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue | [0]" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name club32-backend \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionId'].OutputValue | [0]" \
            --output text)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name club32-backend \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue | [0]" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Export web build
        working-directory: app/frontend
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ steps.stack.outputs.api_url }}
          EXPO_PUBLIC_API_KEY: ${{ secrets.CLUB32_API_KEY }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: |
          rm -rf dist
          npx expo export --platform web

      - name: Patch index.html
        working-directory: app/frontend
        run: node scripts/patch-html.mjs

      - name: Sync to S3
        run: aws s3 sync app/frontend/dist/ "s3://${{ steps.stack.outputs.bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.dist_id }}" \
            --paths "/*"
